name: Publish Dry Run

on:
  workflow_dispatch:  # Manual trigger desde GitHub UI

jobs:
  dry-run:
    name: Test Publish & Authentication
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: cli

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm to latest version
        run: npm install -g npm@latest

      - name: Verify npm version
        run: npm --version

      - name: Clear npm config
        run: npm config delete always-auth

      - name: Show npm config before ci
        run: npm config list

      - run: npm ci

      - run: npm test

      - name: Show .npmrc (censored)
        run: cat ~/.npmrc | grep -v "^;" || echo "No .npmrc found"

      - name: Check authentication with debug
        run: npm whoami --verbose 2>&1 || true

      - name: Check OIDC token
        run: |
          echo "NODE_AUTH_TOKEN: ${NODE_AUTH_TOKEN:-'NOT SET'}"
          echo "NPM_TOKEN: ${NPM_TOKEN:-'NOT SET'}"

      - name: Dry run publish
        run: npm publish --dry-run
        env:
          NPM_CONFIG_PROVENANCE: true

      - name: Success
        run: echo "✅ Dry run completed successfully. OIDC authentication works!"
